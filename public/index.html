<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>She Can Foundation - Contact Us</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>She Can Foundation</h1>
    <p class="subtitle">Empowering women, one step at a time </p>

    <form id="contactForm">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your name" />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" />

      <label for="message">Message</label>
      <textarea id="message" rows="4" placeholder="Write your message..."></textarea>

      <button type="submit">Submit</button>

      <p id="result"></p>
    </form>

    <a class="admin-link" href="admin.html">Admin Panel</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
